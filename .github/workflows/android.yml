name: Android APK

# Build the Capacitor Android app. Manual run -> downloadable artifact.
# Push a tag like `app-v1` -> also publishes warbul.apk to a GitHub Release,
# which the dashboard "Unduh APK" button points to
# (releases/latest/download/warbul.apk).
on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Capacitor 8 CLI requires Node >= 22
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      # Sync web config/plugins into the native project, then build the APK.
      - run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk warbul.apk

      - uses: actions/upload-artifact@v4
        with:
          name: warbul-apk
          path: warbul.apk

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: warbul.apk
