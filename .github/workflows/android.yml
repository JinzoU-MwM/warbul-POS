name: Android APK

# Build the Capacitor Android app. Manual run -> downloadable artifact.
# Push a tag like `app-v1` -> also publishes warbul.apk to a GitHub Release,
# which the dashboard "Unduh APK" button points to
# (releases/latest/download/warbul.apk).
on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Capacitor 8 CLI requires Node >= 22
          cache: npm

      - run: npm ci

      # On an app-vN tag, stamp versionCode=N and versionName="app-vN" into the
      # native build so the in-app update check (/app-version.json vs
      # App.getInfo().build) can tell installed from latest.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VC="${GITHUB_REF_NAME#app-v}"
          sed -i "s/versionCode .*/versionCode ${VC}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${GITHUB_REF_NAME}\"/" android/app/build.gradle
          echo "Built android/app/build.gradle:"; grep -E "versionCode|versionName" android/app/build.gradle

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21 # Capacitor 8 Android lib compiles to Java 21

      - uses: android-actions/setup-android@v3

      # Sync web config/plugins into the native project, then build the APK.
      - run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk warbul.apk

      - uses: actions/upload-artifact@v4
        with:
          name: warbul-apk
          path: warbul.apk

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: warbul.apk

      # Refresh the same-origin copy served by Vercel (fast download in ID) and
      # publish the version manifest the in-app update check reads.
      - name: Update public/warbul.apk + app-version.json on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          VC="${GITHUB_REF_NAME#app-v}"
          cp warbul.apk public/warbul.apk
          printf '{"versionCode":%s,"versionName":"%s","url":"/warbul.apk"}\n' "${VC}" "${GITHUB_REF_NAME}" > public/app-version.json
          git add public/warbul.apk public/app-version.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(app): refresh APK + version manifest (${GITHUB_REF_NAME})"
            git push origin main
          fi
