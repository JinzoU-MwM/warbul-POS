ext {
    minSdkVersion = 24
    compileSdkVersion = 36
    // targetSdk 30: run in pre-Android-12 compat so the legacy BLUETOOTH /
    // BLUETOOTH_ADMIN permissions are granted at install (no runtime prompt) —
    // cordova-plugin-bluetooth-serial (0.4.7) predates the Android 12 runtime
    // Bluetooth permissions. This APK is for internal sideload, not Play Store.
    targetSdkVersion = 30
    androidxActivityVersion = '1.11.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.17.0'
    androidxFragmentVersion = '1.8.9'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.14.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '14.0.1'
}